<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G.R.O.S.S. — Get Rid Of Slimy textS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4f0;
      font-family: 'Georgia', serif;
      color: #1a2a1a;
    }

    /* ── Header ── */
    header {
      background: #1a472a;
      color: #c8f5c8;
      text-align: center;
      padding: 32px 24px 22px;
      border-bottom: 6px solid #ffd700;
      position: relative;
      overflow: hidden;
    }
    .drip {
      position: absolute;
      top: 0;
      background: rgba(100,220,80,0.18);
      border-radius: 0 0 50% 50%;
      pointer-events: none;
    }
    header h1 {
      font-size: clamp(30px, 7vw, 58px);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #7fff00;
      text-shadow: 0 0 20px rgba(127,255,0,0.4), 3px 3px 0 #0a2012;
      line-height: 1.1;
    }
    header .tagline {
      font-family: monospace;
      font-size: clamp(11px, 2.2vw, 15px);
      color: #a0e0a0;
      letter-spacing: 0.15em;
      margin-top: 6px;
    }
    header .sub {
      font-size: clamp(11px, 2vw, 13px);
      color: #c8f5c8;
      opacity: 0.75;
      margin-top: 8px;
    }

    /* ── Main ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }

    /* ── API Key bar ── */
    #key-bar {
      background: #fffbe6;
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #key-bar label {
      font-weight: 700;
      font-size: 13px;
      color: #7a5f00;
      white-space: nowrap;
    }
    #key-bar input {
      flex: 1;
      min-width: 200px;
      border: 1.5px solid #e0c800;
      border-radius: 6px;
      padding: 7px 10px;
      font-family: monospace;
      font-size: 13px;
      background: #fff;
      outline: none;
      color: #333;
    }
    #key-bar input:focus { border-color: #b8a000; }
    #key-note {
      font-size: 11px;
      color: #9a7f00;
      width: 100%;
      margin-top: 2px;
    }

    /* ── Input card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 2px solid #1a472a;
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: 4px 4px 0 #1a472a22;
    }
    .card label {
      display: block;
      font-weight: 700;
      color: #1a472a;
      margin-bottom: 8px;
      font-size: 15px;
      letter-spacing: 0.04em;
    }
    textarea {
      width: 100%;
      border: 1.5px solid #b0c8b0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: Georgia, serif;
      color: #1a2a1a;
      resize: vertical;
      outline: none;
      background: #f8fff8;
      line-height: 1.6;
      min-height: 110px;
    }
    textarea:focus { border-color: #1a472a; }

    /* ── Button ── */
    .btn-wrap { text-align: center; margin-bottom: 24px; }
    #gross-btn {
      background: #1a472a;
      color: #7fff00;
      border: none;
      border-radius: 50px;
      padding: 14px 42px;
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 900;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 4px 4px 0 #0a2012;
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
      font-family: Georgia, serif;
    }
    #gross-btn:hover:not(:disabled) {
      background: #235c38;
      transform: translateY(-2px);
      box-shadow: 6px 6px 0 #0a2012;
    }
    #gross-btn:active:not(:disabled) {
      transform: scale(0.96);
      box-shadow: 2px 2px 0 #0a2012;
    }
    #gross-btn:disabled { background: #6b9b6b; cursor: wait; }

    /* ── Error ── */
    #error-box {
      display: none;
      background: #f8d7da;
      border: 2px solid #dc3545;
      border-radius: 10px;
      padding: 12px 16px;
      color: #721c24;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }

    /* ── Results ── */
    #results { display: none; }

    h2.section-title {
      color: #1a472a;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }

    /* Sentence cards */
    .sent-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 2px 2px 0 #1a472a11;
      border: 2px solid #ccc;
      border-left-width: 6px;
    }
    .sent-card.positive { border-color: #28a745; }
    .sent-card.neutral  { border-color: #ffc107; }
    .sent-card.negative { border-color: #dc3545; }

    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .badge {
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: monospace;
      border: 1px solid transparent;
    }
    .badge.positive { background: #d4edda; color: #155724; border-color: #28a745; }
    .badge.neutral  { background: #fff3cd; color: #856404; border-color: #ffc107; }
    .badge.negative { background: #f8d7da; color: #721c24; border-color: #dc3545; }
    .badge.aspect   { background: #f0f4f0; color: #555;    border-color: #ccc; font-weight: 400; }

    .sent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 500px) { .sent-grid { grid-template-columns: 1fr; } }

    .sent-col-label {
      font-size: 10px;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      color: #888;
    }
    .sent-col-label.edited { color: #1a472a; font-weight: 700; }
    .sent-text { font-size: 14px; line-height: 1.6; }
    .sent-text.original { font-style: italic; color: #444; }
    .sent-text.edited   { color: #1a472a; font-weight: 600; }

    /* Full comparison */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 6px;
    }
    @media (max-width: 500px) { .compare-grid { grid-template-columns: 1fr; } }

    .compare-panel {
      border-radius: 10px;
      padding: 16px 18px;
    }
    .compare-panel.before {
      background: #fff;
      border: 2px solid #ccc;
      box-shadow: 2px 2px 0 #ccc;
    }
    .compare-panel.after {
      background: #f0fff4;
      border: 2px solid #1a472a;
      box-shadow: 2px 2px 0 #1a472a44;
    }
    .compare-label {
      font-size: 11px;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      color: #888;
    }
    .compare-label.after { color: #1a472a; font-weight: 700; }
    .compare-text {
      font-size: 15px;
      line-height: 1.7;
    }
    .compare-text.before { font-style: italic; color: #333; }
    .compare-text.after  { color: #1a2a1a; font-weight: 500; }

    /* copy button */
    #copy-btn {
      display: block;
      margin: 12px 0 0 auto;
      background: #1a472a;
      color: #7fff00;
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      font-family: Georgia, serif;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: background 0.12s;
    }
    #copy-btn:hover { background: #235c38; }
  </style>
</head>
<body>

<header>
  <!-- slime drips -->
  <div class="drip" style="left:8%;  width:22px; height:55px;"></div>
  <div class="drip" style="left:20%; width:14px; height:38px;"></div>
  <div class="drip" style="left:34%; width:26px; height:70px;"></div>
  <div class="drip" style="left:50%; width:18px; height:45px;"></div>
  <div class="drip" style="left:64%; width:30px; height:62px;"></div>
  <div class="drip" style="left:78%; width:16px; height:40px;"></div>
  <div class="drip" style="left:91%; width:24px; height:58px;"></div>

  <h1>G.R.O.S.S.</h1>
  <p class="tagline">Get Rid Of Slimy textS</p>
  <p class="sub">Aspect-Based Sentiment Analyzer · Sentence by Sentence</p>
</header>

<main>

  <!-- API Key -->
  <div id="key-bar">
    <label for="api-key">🔑 Anthropic API Key:</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
    <p id="key-note">Your key is never stored — it lives only in this browser tab.</p>
  </div>

  <!-- Input -->
  <div class="card">
    <label for="input-text">🧻 Paste your text here:</label>
    <textarea id="input-text">Boy, that play really sucked. But the food was good. I don't know if we should go next time.</textarea>
  </div>

  <!-- Button -->
  <div class="btn-wrap">
    <button id="gross-btn">🫧 G.R.O.S.S. now!</button>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">
    <h2 class="section-title">🔬 Sentence Breakdown</h2>
    <div id="breakdown"></div>

    <h2 class="section-title" style="margin-top:28px;">📄 Full Text Comparison</h2>
    <div class="compare-grid">
      <div class="compare-panel before">
        <div class="compare-label">Before</div>
        <p class="compare-text before" id="before-text"></p>
      </div>
      <div class="compare-panel after">
        <div class="compare-label after">✨ After G.R.O.S.S.</div>
        <p class="compare-text after" id="after-text"></p>
      </div>
    </div>
    <button id="copy-btn">📋 Copy edited text</button>
  </div>

</main>

<script>
const SYSTEM_PROMPT = `You are G.R.O.S.S. — Get Rid Of Slimy textS — an Aspect-Based Sentiment Analyzer.

Your job:
1. Split the user's input into individual sentences.
2. For each sentence, identify the ASPECT (what it's about) and the SENTIMENT (positive / neutral / negative).
3. Rewrite negative or harsh sentences to be more positive, tactful, and constructive — without losing meaning. Keep positive sentences largely intact (minor polish OK). Keep neutral sentences neutral unless a small tweak helps.
4. Return ONLY a JSON array — no markdown, no preamble. Each element:
{"original":"...","aspect":"...","sentiment":"positive"|"neutral"|"negative","edited":"..."}

Rules for edits:
- Replace harsh words with constructive alternatives ("sucked" → "didn't land for me").
- Flip uncertainty/dread into openness ("I don't know if we should go" → "Should we go next time?").
- Keep edits SHORT — roughly match the original sentence length.
- Never make things falsely euphoric. Grounded positivity only.`;

const btn      = document.getElementById('gross-btn');
const errorBox = document.getElementById('error-box');
const results  = document.getElementById('results');
const breakdown= document.getElementById('breakdown');
const beforeTxt= document.getElementById('before-text');
const afterTxt = document.getElementById('after-text');
const copyBtn  = document.getElementById('copy-btn');
const inputEl  = document.getElementById('input-text');
const keyEl    = document.getElementById('api-key');

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}
function hideError() { errorBox.style.display = 'none'; }

btn.addEventListener('click', async () => {
  const text = inputEl.value.trim();
  const key  = keyEl.value.trim();

  if (!key)  { showError('⚠️ Please enter your Anthropic API key above.'); return; }
  if (!text) { showError('⚠️ Please paste some text to analyze.'); return; }

  hideError();
  results.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '🧼 Scrubbing…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: text }],
      }),
    });

    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch(e) { showError('Unexpected response (' + res.status + '): ' + raw.slice(0, 300)); return; }

    if (!res.ok || data.error) {
      showError('API ' + res.status + ': ' + (data?.error?.message || raw.slice(0, 300)));
      return;
    }

    const content = (data.content || []).map(b => b.text || '').join('').trim();
    const clean   = content.replace(/```json|```/g, '').trim();
    let sentences;
    try { sentences = JSON.parse(clean); }
    catch(e) { showError('Could not parse AI response: ' + clean.slice(0, 200)); return; }

    renderResults(text, sentences);

  } catch(e) {
    showError(e.name + ': ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🫧 G.R.O.S.S. now!';
  }
});

function renderResults(originalInput, sentences) {
  // Breakdown
  breakdown.innerHTML = '';
  sentences.forEach(s => {
    const sent = (s.sentiment || 'neutral').toLowerCase();
    const card = document.createElement('div');
    card.className = 'sent-card ' + sent;
    card.innerHTML = `
      <div class="tags">
        <span class="badge ${sent}">${sent}</span>
        <span class="badge aspect">📌 ${esc(s.aspect)}</span>
      </div>
      <div class="sent-grid">
        <div>
          <div class="sent-col-label">Original</div>
          <div class="sent-text original">"${esc(s.original)}"</div>
        </div>
        <div>
          <div class="sent-col-label edited">✨ Edited</div>
          <div class="sent-text edited">"${esc(s.edited)}"</div>
        </div>
      </div>`;
    breakdown.appendChild(card);
  });

  // Full comparison
  const edited = sentences.map(s => s.edited).join(' ');
  beforeTxt.textContent = originalInput;
  afterTxt.textContent  = edited;

  // Copy button
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(edited).then(() => {
      copyBtn.textContent = '✅ Copied!';
      setTimeout(() => copyBtn.textContent = '📋 Copy edited text', 2000);
    });
  };

  results.style.display = 'block';
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
